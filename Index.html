<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Break Glass</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --glass-base: rgba(180, 220, 255, 0.12);
    --glass-border: rgba(180, 220, 255, 0.35);
    --crack: rgba(255,255,255,0.85);
    --accent: #00e5ff;
    --danger: #ff3d5a;
    --gold: #ffd600;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  #game-wrapper {
    position: relative;
    z-index: 1;
    width: 100vw;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* HUD */
  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 12px 20px 8px;
  }

  .hud-block { display: flex; flex-direction: column; align-items: center; }
  .hud-label { font-size: 9px; letter-spacing: 3px; color: rgba(0,229,255,0.5); text-transform: uppercase; }
  .hud-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
  #level-val { color: var(--gold); }

  /* Progress bar */
  #progress-bar-wrap {
    width: calc(100% - 40px);
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 4px 20px 12px;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Glass grid */
  #glass-grid {
    display: grid;
    gap: 10px;
    padding: 10px 16px;
    width: 100%;
  }

  .glass-panel {
    position: relative;
    aspect-ratio: 1;
    background: var(--glass-base);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.05s;
    -webkit-tap-highlight-color: transparent;
    box-shadow:
      inset 0 0 20px rgba(180,220,255,0.06),
      0 0 1px rgba(180,220,255,0.3);
  }

  /* Shine effect */
  .glass-panel::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 60%;
    height: 150%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
    transform: skewX(-15deg);
    pointer-events: none;
  }

  .glass-panel:active { transform: scale(0.95); }

  /* SVG cracks drawn inside each panel */
  .glass-panel svg.cracks {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Shattered state */
  .glass-panel.shattered {
    animation: shatter 0.35s forwards;
    pointer-events: none;
  }

  @keyframes shatter {
    0%   { transform: scale(1); filter: brightness(3); }
    20%  { transform: scale(1.08) rotate(1deg); }
    60%  { transform: scale(0.9) rotate(-1deg); opacity: 0.6; }
    100% { transform: scale(0) rotate(3deg); opacity: 0; }
  }

  /* Hit flash */
  .glass-panel.hit-flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.4);
    animation: flash 0.15s forwards;
    pointer-events: none;
  }
  @keyframes flash { to { opacity: 0; } }

  /* ---- Screens ---- */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(6px);
  }
  .screen.hidden { display: none; }

  .screen-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(0,229,255,0.6);
    text-align: center;
    line-height: 0.9;
  }
  .screen-sub {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }
  .screen-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,214,0,0.5);
  }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 14px 48px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  /* Timer ring */
  #timer-ring-wrap {
    position: relative;
    width: 54px;
    height: 54px;
  }
  #timer-ring-wrap svg { transform: rotate(-90deg); }
  #timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--danger);
  }
  #timer-circle {
    transition: stroke-dashoffset 1s linear;
    stroke: var(--danger);
  }

  /* Combo popup */
  #combo-popup {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,214,0,0.7);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
  }
  #combo-popup.show {
    animation: comboAnim 0.7s forwards;
  }
  @keyframes comboAnim {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.7); }
    40%  { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1.15); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1); }
  }

  /* Shard particles */
  .shard {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    border-radius: 1px;
    background: rgba(180,220,255,0.7);
    animation: shardFly var(--dur, 0.6s) forwards ease-out;
  }
  @keyframes shardFly {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 0.9; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.3); opacity: 0; }
  }

  /* Lives */
  #lives-display { display: flex; gap: 6px; align-items: center; }
  .life-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
    transition: all 0.3s;
  }
  .life-dot.lost { background: rgba(255,61,90,0.15); box-shadow: none; border: 1px solid rgba(255,61,90,0.3); }
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div class="screen-title">BREAK<br>GLASS</div>
  <div class="screen-sub">TAP TO SHATTER · BEAT THE CLOCK</div>
  <button class="btn" onclick="startGame()">PLAY</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameover-screen">
  <div class="screen-title" style="color:var(--danger);text-shadow:0 0 30px rgba(255,61,90,0.6)">GAME<br>OVER</div>
  <div class="screen-sub">FINAL SCORE</div>
  <div class="screen-score" id="final-score">0</div>
  <div class="screen-sub" id="best-label"></div>
  <button class="btn" style="border-color:var(--danger);color:var(--danger)" onclick="startGame()">RETRY</button>
</div>

<!-- LEVEL UP SCREEN -->
<div class="screen hidden" id="levelup-screen">
  <div class="screen-title" style="color:var(--gold);text-shadow:0 0 30px rgba(255,214,0,0.6)">LEVEL<br>UP!</div>
  <div class="screen-sub" id="levelup-sub"></div>
</div>

<!-- GAME UI -->
<div id="game-wrapper">
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-val" id="score-val">0</span>
    </div>
    <div id="timer-ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle cx="27" cy="27" r="22" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3"/>
        <circle id="timer-circle" cx="27" cy="27" r="22" fill="none" stroke-width="3"
          stroke-dasharray="138.2" stroke-dashoffset="0" stroke-linecap="round"/>
      </svg>
      <div id="timer-text">15</div>
    </div>
    <div class="hud-block" style="align-items:flex-end">
      <span class="hud-label">Level</span>
      <span class="hud-val" id="level-val">1</span>
    </div>
  </div>

  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

  <div style="display:flex;justify-content:center;margin-bottom:6px;">
    <div id="lives-display"></div>
  </div>

  <div id="glass-grid"></div>
</div>

<div id="combo-popup"></div>

<script>
// ---- Game State ----
const LEVELS = [
  { cols: 2, rows: 2, hitsPerPanel: 1, timeLimit: 15 },
  { cols: 3, rows: 2, hitsPerPanel: 1, timeLimit: 18 },
  { cols: 3, rows: 3, hitsPerPanel: 2, timeLimit: 22 },
  { cols: 4, rows: 3, hitsPerPanel: 2, timeLimit: 25 },
  { cols: 4, rows: 4, hitsPerPanel: 3, timeLimit: 28 },
  { cols: 4, rows: 4, hitsPerPanel: 3, timeLimit: 24 },
  { cols: 5, rows: 4, hitsPerPanel: 3, timeLimit: 28 },
];

let score = 0, level = 1, lives = 3, combo = 0;
let timeLeft = 15, timerInterval = null;
let panelHits = [], totalPanels = 0, shatteredCount = 0;
let gameActive = false;
let bestScore = parseInt(localStorage.getItem('bg_best') || '0');

const CIRCUMFERENCE = 2 * Math.PI * 22; // ~138.2

function getLevelConfig(lvl) {
  return LEVELS[Math.min(lvl - 1, LEVELS.length - 1)];
}

function startGame() {
  score = 0; level = 1; lives = 3; combo = 0;
  hide('start-screen'); hide('gameover-screen'); hide('levelup-screen');
  gameActive = true;
  updateHUD();
  buildLevel();
}

function buildLevel() {
  clearTimer();
  const cfg = getLevelConfig(level);
  timeLeft = cfg.timeLimit;
  totalPanels = cfg.cols * cfg.rows;
  shatteredCount = 0;
  panelHits = [];

  const grid = document.getElementById('glass-grid');
  grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  grid.innerHTML = '';

  for (let i = 0; i < totalPanels; i++) {
    panelHits[i] = 0;
    const panel = document.createElement('div');
    panel.className = 'glass-panel';
    panel.dataset.idx = i;
    panel.innerHTML = `<svg class="cracks" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>`;
    panel.addEventListener('click', e => onPanelClick(panel, i, cfg, e));
    panel.addEventListener('touchstart', e => { e.preventDefault(); onPanelClick(panel, i, cfg, e.touches[0]); }, { passive: false });
    grid.appendChild(panel);
  }

  updateLives();
  updateProgress();
  updateHUD();
  startTimer(cfg.timeLimit);
}

function onPanelClick(panel, idx, cfg, e) {
  if (!gameActive || panel.classList.contains('shattered')) return;

  panelHits[idx]++;
  const hitCount = panelHits[idx];
  const maxHits = cfg.hitsPerPanel;

  // Crack animation
  addCrack(panel, hitCount, maxHits);
  panel.classList.add('hit-flash');
  setTimeout(() => panel.classList.remove('hit-flash'), 150);

  if (hitCount >= maxHits) {
    // Shatter!
    const rect = panel.getBoundingClientRect();
    spawnShards(rect.left + rect.width/2, rect.top + rect.height/2);
    panel.classList.add('shattered');
    setTimeout(() => { panel.style.visibility = 'hidden'; }, 350);
    shatteredCount++;
    combo++;

    const pts = 10 * level * combo;
    score += pts;

    if (combo >= 3) showCombo(combo);
    updateHUD();
    updateProgress();

    if (shatteredCount >= totalPanels) {
      // Level complete!
      clearTimer();
      const bonusTime = Math.floor(timeLeft * 5 * level);
      score += bonusTime;
      updateHUD();
      levelUp();
    }
  } else {
    combo = 0;
  }
}

function addCrack(panel, hitCount, maxHits) {
  const svg = panel.querySelector('svg.cracks');
  const cx = 30 + Math.random() * 40;
  const cy = 30 + Math.random() * 40;
  const branches = 3 + Math.floor(Math.random() * 3) + hitCount;

  for (let b = 0; b < branches; b++) {
    const angle = (b / branches) * 360 + Math.random() * 30;
    const rad = angle * Math.PI / 180;
    const len = 15 + Math.random() * 30;
    const ex = cx + Math.cos(rad) * len;
    const ey = cy + Math.sin(rad) * len;

    // Main crack line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', ex); line.setAttribute('y2', ey);
    line.setAttribute('stroke', 'rgba(255,255,255,0.8)');
    line.setAttribute('stroke-width', hitCount > 1 ? '1.5' : '0.8');
    svg.appendChild(line);

    // Sub-crack
    if (Math.random() > 0.4) {
      const mid = 0.4 + Math.random() * 0.3;
      const mx = cx + Math.cos(rad) * len * mid;
      const my = cy + Math.sin(rad) * len * mid;
      const subAngle = rad + (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.5);
      const subLen = len * 0.4;
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      sub.setAttribute('x1', mx); sub.setAttribute('y1', my);
      sub.setAttribute('x2', mx + Math.cos(subAngle) * subLen);
      sub.setAttribute('y2', my + Math.sin(subAngle) * subLen);
      sub.setAttribute('stroke', 'rgba(255,255,255,0.5)');
      sub.setAttribute('stroke-width', '0.6');
      svg.appendChild(sub);
    }
  }
}

function spawnShards(cx, cy) {
  for (let i = 0; i < 10; i++) {
    const shard = document.createElement('div');
    shard.className = 'shard';
    const size = 3 + Math.random() * 8;
    const angle = Math.random() * 360;
    const dist = 40 + Math.random() * 80;
    const tx = Math.cos(angle * Math.PI/180) * dist + 'px';
    const ty = (Math.sin(angle * Math.PI/180) * dist - 30) + 'px';
    shard.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${size}px; height:${size * 0.4}px;
      --tx:${tx}; --ty:${ty};
      --rot:${Math.random()*360}deg;
      --dur:${0.4 + Math.random()*0.4}s;
      transform-origin: center;
    `;
    document.body.appendChild(shard);
    setTimeout(() => shard.remove(), 800);
  }
}

function showCombo(n) {
  const el = document.getElementById('combo-popup');
  el.textContent = `${n}x COMBO!`;
  el.className = '';
  void el.offsetWidth;
  el.className = 'show';
}

function levelUp() {
  gameActive = false;
  const screen = document.getElementById('levelup-screen');
  document.getElementById('levelup-sub').textContent = `LEVEL ${level} COMPLETE · +${Math.floor(timeLeft * 5 * level)} BONUS`;
  show('levelup-screen');
  level++;
  combo = 0;
  setTimeout(() => {
    hide('levelup-screen');
    gameActive = true;
    buildLevel();
  }, 1600);
}

function startTimer(duration) {
  updateTimerRing(duration, duration);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerRing(timeLeft, duration);
    document.getElementById('timer-text').textContent = timeLeft;

    if (timeLeft <= 5) document.getElementById('timer-text').style.color = 'var(--danger)';
    else document.getElementById('timer-text').style.color = 'var(--danger)';

    if (timeLeft <= 0) {
      clearTimer();
      loseLife();
    }
  }, 1000);
}

function updateTimerRing(current, total) {
  const offset = CIRCUMFERENCE * (1 - current / total);
  document.getElementById('timer-circle').style.strokeDashoffset = offset;
  document.getElementById('timer-text').textContent = Math.max(0, current);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function loseLife() {
  lives--;
  combo = 0;
  updateLives();
  if (lives <= 0) {
    gameOver();
  } else {
    // Shake effect
    document.getElementById('glass-grid').style.animation = 'none';
    document.body.style.filter = 'brightness(2)';
    setTimeout(() => { document.body.style.filter = ''; }, 100);
    buildLevel();
  }
}

function gameOver() {
  gameActive = false;
  clearTimer();
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('bg_best', bestScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-label').textContent = `BEST: ${bestScore}`;
  show('gameover-screen');
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
}

function updateLives() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'life-dot' + (i >= lives ? ' lost' : '');
    el.appendChild(dot);
  }
}

function updateProgress() {
  const pct = (shatteredCount / totalPanels) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// Prevent scroll on touch
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
          </html>
